[tox]
envlist=
    py{310,311,312,313,313t,314,314t}-core
    py{310,311,312,313,313t,314,314t}-lint
    py{310,311,312,313,313t,314,314t}-wheel
    docs

[flake8]
exclude=venv*,.tox,docs,build
extend-ignore=E203
max-line-length=88
per-file-ignores=__init__.py:F401

[blocklint]
max_issue_threshold=1

[testenv]
usedevelop=True
commands=
    core: pytest {posargs:tests/core}
    docs: make check-docs-ci
basepython=
    docs: python
extras=
    test
    docs
allowlist_externals=make,pre-commit

[py{310,311,312,313,313t,314,314t}-lint]
deps=pre-commit
extras=dev
commands=
    pre-commit install
    pre-commit run --all-files --show-diff-on-failure

[testenv:py{310,311,312,313,313t,314,314t}-wheel]
deps=
    wheel
    build[virtualenv]
commands=
    python -m pip install --upgrade pip
    python scripts/ci/smoke_test_built_wheel.py
skip_install=true
